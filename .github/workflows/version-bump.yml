name: version-bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump kind"
        required: true
        default: "auto"
        type: choice
        options: [auto, patch, minor, major]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      # Action pinned by SHA per OSS_SPEC §14.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Resolve next version
        id: ver
        run: |
          ./scripts/release.sh ${{ inputs.bump }}
      - name: Push tag
        run: git push origin "v${{ steps.ver.outputs.version }}"
