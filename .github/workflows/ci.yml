name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Every `uses:` line below is pinned by commit SHA per OSS_SPEC §14,
# except `dtolnay/rust-toolchain` which §10.3 mandates be pinned by
# its toolchain-version tag (`@1.88.0`) so the version pinned in CI
# is auditable from one glance.
# Adjacent comments record the human-readable version for review;
# keep both in sync when bumping.

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0 # OSS_SPEC §10.3
        with:
          components: clippy, rustfmt
      - run: cargo build --all-targets
      - run: cargo test --all
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --all -- --check


  # Lint workflow YAML with actionlint and shell scripts with
  # shellcheck (OSS_SPEC §16.1). shellcheck is preinstalled on
  # ubuntu-latest; actionlint is fetched via its official installer.
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "${PWD}" >> "$GITHUB_PATH"
      - name: make actionlint
        run: make actionlint
      - name: make shellcheck
        run: make shellcheck

  # Software composition analysis (OSS_SPEC §14). Fails the build on
  # any open RUSTSEC advisory so a vulnerable transitive dependency
  # cannot ship to crates.io. Runs on every PR and every push to main.
  #
  # Uses `cargo audit` directly (installed via taiki-e/install-action
  # for prebuilt-binary speed) rather than the rustsec/audit-check
  # action, so that the project-local `.cargo/audit.toml` allowlist
  # — including its inline rationale comments for each ignored
  # advisory — is the single source of truth for what we suppress.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # 0.22.x is required to parse advisories that use CVSS v4.0
      # (e.g. RUSTSEC-2026-0073) — earlier versions fail to load the
      # database before scanning anything. taiki-e/install-action's
      # prebuilt manifest doesn't carry 0.22.1 yet and its bundled
      # cargo-binstall can't parse cargo-audit's `edition = "2024"`,
      # so we compile cargo-audit ourselves. The cache below makes
      # the ~3-minute build a one-time cost per version.
      - uses: dtolnay/rust-toolchain@1.88.0 # OSS_SPEC §10.3
      - uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        id: cache-cargo-audit
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.1-${{ runner.os }}
      - if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install --locked --version 0.22.1 cargo-audit
      - run: cargo audit
