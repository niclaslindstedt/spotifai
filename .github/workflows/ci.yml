name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Every `uses:` line below is pinned by commit SHA per OSS_SPEC §14.
# Adjacent comments record the human-readable version for review;
# keep both in sync when bumping.

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88.0
        with:
          components: clippy, rustfmt
      - run: cargo build --all-targets
      - run: cargo test --all
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --all -- --check


  # Lint workflow YAML with actionlint and shell scripts with
  # shellcheck (OSS_SPEC §16.1). shellcheck is preinstalled on
  # ubuntu-latest; actionlint is fetched via its official installer.
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "${PWD}" >> "$GITHUB_PATH"
      - name: make actionlint
        run: make actionlint
      - name: make shellcheck
        run: make shellcheck

  # Software composition analysis (OSS_SPEC §14). Fails the build on
  # any open RUSTSEC advisory so a vulnerable transitive dependency
  # cannot ship to crates.io. Runs on every PR and every push to main.
  #
  # Uses `cargo audit` directly (installed via taiki-e/install-action
  # for prebuilt-binary speed) rather than the rustsec/audit-check
  # action, so that the project-local `.cargo/audit.toml` allowlist
  # — including its inline rationale comments for each ignored
  # advisory — is the single source of truth for what we suppress.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Pin a known toolchain so the runner's preinstalled rust (which
      # has churned across image versions) cannot drift the result.
      - uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88.0
      - uses: taiki-e/install-action@899b013517f9e7774591216672bf75a46bb9a481 # v2.9.4
        with:
          tool: cargo-audit
      - run: cargo audit
