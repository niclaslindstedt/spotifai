name: release

# Triggered by the `v*` tag push that version-bump performs. That
# upstream tag push must be authenticated with RELEASE_TOKEN (a PAT
# or GitHub App token) — the default GITHUB_TOKEN deliberately
# suppresses downstream workflow triggers, so a tag pushed with it
# would not fire this workflow.
#
# This workflow itself uses the default GITHUB_TOKEN for its
# commit-to-main and retag steps. That same trigger suppression is
# what prevents the force-pushed tag from re-firing this workflow on
# itself and starting a duplicate release run. See OSS_SPEC §10.3.
on:
  push:
    tags:
      - 'v*'

# Default to no permissions; every job declares its own
# least-privilege `permissions:` block (see OSS_SPEC §10.3).
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    # contents: write — this job pushes the release commit and
    #                   force-pushes the rewritten tag to `main`.
    # Publishing to crates.io lives in a separate `publish-crates`
    # job so it can run with `contents: read` and a scoped GitHub
    # Environment, per OSS_SPEC §10.3.
    permissions:
      contents: write
    outputs:
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    # Every `uses:` line below is pinned by commit SHA per OSS_SPEC §14,
    # except `dtolnay/rust-toolchain` which §10.3 mandates be pinned by
    # its toolchain-version tag (`@1.88.0`).
    # Adjacent comments record the human-readable version for review.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        run: ./scripts/generate-changelog.sh ${{ steps.tag.outputs.tag }}
      - name: Update versions
        run: ./scripts/update-versions.sh ${{ steps.tag.outputs.tag }}
      - name: Commit + retag
        id: commit
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): update changelog and versions for ${{ steps.tag.outputs.tag }}"
          git tag -f "${{ steps.tag.outputs.tag }}" HEAD
          git push origin HEAD:main
          git push origin "${{ steps.tag.outputs.tag }}" --force
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@1.88.0 # OSS_SPEC §10.3
      - run: cargo build --release
      - run: cargo test
      - name: GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    environment: crates-registry
    # id-token: write — required for OIDC-based trusted publishing
    #                   to crates.io.
    # contents: read  — only needs to read the source at the
    #                   release commit; never pushes back.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release.outputs.commit_sha }}
      - uses: dtolnay/rust-toolchain@1.88.0 # OSS_SPEC §10.3
      - name: Authenticate to crates.io (trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish spotifai
        # `--allow-dirty`: the release job bumps `Cargo.toml` but
        # does not refresh `Cargo.lock`; `cargo publish` runs its
        # own build first, which regenerates the lockfile and would
        # otherwise abort with "files in the working directory
        # contain changes that were not yet committed". The dirty
        # file is only the bumped local-package version in
        # `Cargo.lock` — safe to publish.
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}