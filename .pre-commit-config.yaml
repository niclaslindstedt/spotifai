# §16 pre-commit hooks. Install once with `pre-commit install` (see
# CONTRIBUTING.md). The hooks below run the same gates as CI so
# review never sees a regression that local tooling would have caught.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: local
    hooks:
      - id: cargo-fmt-check
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy -D warnings
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: '^(scripts/.*\.sh|.*\.bash)$'

      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: '^\.github/workflows/.*\.ya?ml$'
        pass_filenames: false

      - id: changelog-guard
        name: forbid CHANGELOG.md edits outside release commits
        entry: scripts/changelog-guard.sh
        language: system
        files: '^CHANGELOG\.md$'
        pass_filenames: false
